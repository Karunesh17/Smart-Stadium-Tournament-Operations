services:
  - type: web
    name: smart-stadium-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn services.gateway.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      # Leaving DATABASE_URL unset uses the project's SQLite demo database.
      # It is ephemeral on Render's free web service.
