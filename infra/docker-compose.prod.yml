# ============================================================
# Smart Stadium — Production Docker Compose
# Usage: docker compose -f infra/docker-compose.prod.yml up -d
# ============================================================

version: '3.8'

services:

  # ──────────────────────────────────────────
  # PostgreSQL — Primary relational database
  # ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: smart-stadium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stadium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-smart_stadium}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stadium} -d ${POSTGRES_DB:-smart_stadium}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  # ──────────────────────────────────────────
  # Redis — Event pub/sub + cache
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smart-stadium-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  # ──────────────────────────────────────────
  # Qdrant — Vector database for AI RAG
  # ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: smart-stadium-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  # ──────────────────────────────────────────
  # Gateway — FastAPI application
  # ──────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    image: smart-stadium-gateway:latest
    container_name: smart-stadium-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stadium}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smart_stadium}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
